<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Generator</title>
    <style>
        body {
            font-family: system-ui;
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
        }

        .sidebar {
            background: #f0f4f8;
            padding: 20px;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .main {
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .control {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .grid-preview {
            flex: 1;
            background: #fff;
            border: 1px dashed #ccc;
            padding: 20px;
            position: relative;
            overflow: auto;
        }

        .grid-container {
            display: grid;
            background: #e2e8f0;
            gap: 10px;
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        .grid-item {
            background: #60a5fa;
            border: 1px solid #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 4px;
        }

        .code-box {
            background: #1e293b;
            color: #cbd5e1;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            height: 150px;
            overflow: auto;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>🛠️ Grid Builder</h2>

        <div class="control">
            <label>Columns (e.g. 1fr 1fr 200px)</label>
            <input type="text" id="cols" value="1fr 1fr 1fr" oninput="update()">
        </div>
        <div class="control">
            <label>Rows (e.g. 100px auto)</label>
            <input type="text" id="rows" value="150px 150px" oninput="update()">
        </div>
        <div class="control">
            <label>Gap (px)</label>
            <input type="text" id="gap" value="10px" oninput="update()">
        </div>
        <div class="control">
            <label>Items Count</label>
            <input type="number" id="count" value="6" oninput="update()">
        </div>
    </div>

    <div class="main">
        <div class="grid-preview">
            <div id="container" class="grid-container"></div>
        </div>

        <div class="code-box">
            <pre id="cssOutput"></pre>
        </div>
    </div>

    <script>
        function update() {
            const cols = document.getElementById('cols').value;
            const rows = document.getElementById('rows').value;
            const gap = document.getElementById('gap').value;
            const count = document.getElementById('count').value;

            const container = document.getElementById('container');

            // Update Styles
            container.style.gridTemplateColumns = cols;
            container.style.gridTemplateRows = rows;
            container.style.gap = gap;

            // Rebuild Items
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.textContent = i;
                container.appendChild(div);
            }

            // Update Code
            document.getElementById('cssOutput').textContent = `.container {
  display: grid;
  grid-template-columns: ${cols};
  grid-template-rows: ${rows};
  gap: ${gap};
}`;
        }

        update();
    </script>
</body>

</html>
