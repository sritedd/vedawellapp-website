<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Whiteboard</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui;
            background: white;
            touch-action: none;
        }

        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #eee;
        }

        .tool-group {
            display: flex;
            gap: 5px;
            border-right: 1px solid #eee;
            padding-right: 15px;
        }

        .tool-group:last-child {
            border: none;
            padding: 0;
        }

        button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        button:hover {
            background: #e0e0e0;
        }

        button.active {
            background: #222;
            color: white;
            transform: scale(1.1);
        }

        .color-btn {
            width: 30px;
            height: 30px;
        }

        .color-btn.active {
            border: 2px solid #222;
            transform: scale(1.2);
        }

        input[type=range] {
            width: 80px;
        }

        canvas {
            cursor: crosshair;
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <div class="tool-group">
            <button id="penBtn" class="active" onclick="setTool('pen')">✏️</button>
            <button id="eraserBtn" onclick="setTool('eraser')">🧹</button>
        </div>
        <div class="tool-group">
            <button class="color-btn" style="background:black" onclick="setColor('black')"></button>
            <button class="color-btn" style="background:#ef4444" onclick="setColor('#ef4444')"></button>
            <button class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6')"></button>
            <button class="color-btn" style="background:#10b981" onclick="setColor('#10b981')"></button>
        </div>
        <div class="tool-group">
            <input type="range" min="1" max="20" value="3" onchange="setSize(this.value)" title="Brush Size">
        </div>
        <div class="tool-group">
            <button onclick="clearCanvas()" title="Clear All">🗑️</button>
            <button onclick="download()" title="Save Image">💾</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isDrawing = false;
        let tool = 'pen';
        let color = 'black';
        let size = 3;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.onresize = resize;
        resize();

        // Draw Logic
        function start(e) {
            isDrawing = true;
            draw(e);
        }

        function stop() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;

            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;

            ctx.lineWidth = size;
            ctx.strokeStyle = tool === 'eraser' ? 'white' : color;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Events
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);

        // Tools
        function setTool(t) {
            tool = t;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(t + 'Btn').classList.add('active');
        }

        function setColor(c) {
            color = c;
            tool = 'pen';
            document.getElementById('penBtn').classList.add('active');
            document.getElementById('eraserBtn').classList.remove('active');
        }

        function setSize(s) {
            size = s;
        }

        function clearCanvas() {
            if (confirm('Clear whiteboard?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'whiteboard.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>

</html>
