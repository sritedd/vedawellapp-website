<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter</title>
    <style>
        body {
            font-family: monospace;
            background: #222;
            color: #0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .clock {
            font-size: 3rem;
            margin-bottom: 2rem;
            border: 2px solid #0f0;
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .converter {
            background: #333;
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            border: 1px solid #444;
        }

        .row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: flex-end;
        }

        input {
            background: #111;
            border: 1px solid #555;
            color: white;
            padding: 0.8rem;
            font-family: monospace;
            font-size: 1.1rem;
            flex: 1;
            border-radius: 4px;
        }

        button {
            background: #0f0;
            color: black;
            border: none;
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #0c0;
        }

        .result {
            font-size: 1.2rem;
            margin-top: 0.5rem;
            color: white;
        }

        .human-readable {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        h1 {
            color: white;
            margin-bottom: 2rem;
            font-family: system-ui;
        }
    </style>
</head>

<body>
    <h1>Unix Timestamp Converter</h1>

    <div class="label">Current Unix Epoch</div>
    <div class="clock" id="now">0</div>

    <div class="converter">
        <div class="row">
            <div style="flex:1">
                <div class="label">Timestamp to Date</div>
                <input type="number" id="tsInput" placeholder="1672531200">
                <div class="human-readable" id="tsResult"></div>
            </div>
            <button onclick="convertTS()">Convert &rarr;</button>
        </div>

        <div class="row">
            <div style="flex:1">
                <div class="label">Date to Timestamp</div>
                <input type="datetime-local" id="dateInput">
                <div class="human-readable" id="dateResult"></div>
            </div>
            <button onclick="convertDate()">Convert &rarr;</button>
        </div>
    </div>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('now').textContent = Math.floor(Date.now() / 1000);
        }, 1000);

        // Initial
        const now = new Date();
        document.getElementById('now').textContent = Math.floor(now / 1000);
        // Fix datetime-local input offset
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateInput').value = now.toISOString().slice(0, 16);

        function convertTS() {
            let ts = document.getElementById('tsInput').value;
            if (!ts) return;
            // Detect millis
            if (ts.length > 11) ts = Number(ts);
            else ts = Number(ts) * 1000;

            const date = new Date(ts);
            document.getElementById('tsResult').textContent = date.toUTCString() + " | " + date.toLocaleTimeString();
        }

        function convertDate() {
            const str = document.getElementById('dateInput').value;
            if (!str) return;
            const date = new Date(str);
            const ts = Math.floor(date.getTime() / 1000);
            document.getElementById('dateResult').textContent = ts;
        }
    </script>
</body>

</html>
