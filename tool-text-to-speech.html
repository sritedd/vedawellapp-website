<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #e8f5e9;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #2e7d32;
            margin-top: 0;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 2px solid #a5d6a7;
            border-radius: 8px;
            resize: none;
            font-size: 1.1rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: #2e7d32;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        select {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
        }

        .btn-row {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .speak-btn {
            background: #4caf50;
            color: white;
        }

        .speak-btn:hover {
            background: #388e3c;
        }

        .speak-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stop-btn {
            background: #ff5252;
            color: white;
        }

        .stop-btn:hover {
            background: #d32f2f;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🗣️ Text to Speech</h1>

        <textarea id="text"
            placeholder="Type something here and I will read it out loud...">Hello! I can convert your text into speech directly in the browser.</textarea>

        <div class="controls">
            <div>
                <label>Voice</label>
                <select id="voices"></select>
            </div>
            <div>
                <label>Speed (Rate)</label>
                <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" style="width:100%">
            </div>
        </div>

        <div class="btn-row">
            <button class="speak-btn" onclick="speak()">▶ Speak</button>
            <button class="stop-btn" onclick="stop()">⏹ Stop</button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voices');
        let voices = [];

        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';

            // Prioritize English
            voices.sort((a, b) => a.lang.includes('en') ? -1 : 1);

            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-lang', voice.lang);
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }

        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        function speak() {
            if (synth.speaking) {
                console.error('speechSynthesis.speaking');
                return;
            }

            const text = document.getElementById('text').value;
            if (text !== '') {
                const utterThis = new SpeechSynthesisUtterance(text);

                const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
                for (let i = 0; i < voices.length; i++) {
                    if (voices[i].name === selectedOption) {
                        utterThis.voice = voices[i];
                        break;
                    }
                }

                utterThis.rate = document.getElementById('rate').value;
                synth.speak(utterThis);
            }
        }

        function stop() {
            synth.cancel();
        }
    </script>
</body>

</html>
