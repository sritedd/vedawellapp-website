name: Daily Bluesky Post

on:
  schedule:
    # Runs at 8:00 AM AEST (10:00 PM UTC previous day) every day
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
  BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    name: Post to Bluesky

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Restore posting history
        uses: actions/cache@v4
        with:
          path: scripts/.bluesky-posted.json
          key: bluesky-posted-${{ github.run_number }}
          restore-keys: |
            bluesky-posted-

      - name: Post to Bluesky
        run: node scripts/post-to-bluesky.mjs

      - name: Show status
        run: node scripts/post-to-bluesky.mjs --status

      - name: Commit posting history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f scripts/.bluesky-posted.json ]; then
            git add scripts/.bluesky-posted.json
            git diff --staged --quiet || git commit -m "Auto-post to Bluesky [skip ci]"
            git push
          fi
