name: Daily Bluesky Post

on:
  schedule:
    # Runs at 8:00 AM AEST (10:00 PM UTC previous day) every day
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Required so the final step can git push the updated .bluesky-posted.json
# back to main. Default GitHub Actions token is contents:read since 2023.
permissions:
  contents: write

env:
  BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
  BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    name: Post to Bluesky

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the workflow's GITHUB_TOKEN so we can push back. Without this
          # the actions/checkout default uses a token that can't push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Cache key must be stable so each day's run actually restores the
      # previous day's history. The original key included github.run_number,
      # which is unique per run → cache always missed → history was never
      # persisted → script kept picking index 0 every single day. This is
      # the fallback layer; the git commit at the end is the primary store.
      - name: Restore posting history (cache fallback)
        uses: actions/cache@v4
        with:
          path: scripts/.bluesky-posted.json
          key: bluesky-posted-history

      - name: Post to Bluesky
        run: node scripts/post-to-bluesky.mjs

      - name: Show status
        run: node scripts/post-to-bluesky.mjs --status

      - name: Commit posting history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f scripts/.bluesky-posted.json ]; then
            git add scripts/.bluesky-posted.json
            git diff --staged --quiet || git commit -m "Auto-post to Bluesky [skip ci]"
            git push
          fi
