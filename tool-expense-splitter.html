<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Splitter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .section {
            margin-bottom: 1.5rem
        }

        .section h3 {
            font-size: .9rem;
            color: #666;
            margin-bottom: .75rem
        }

        .people-list {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            margin-bottom: .75rem
        }

        .person-chip {
            background: #e8f5e9;
            padding: .5rem 1rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .person-chip button {
            background: #ff6b6b;
            color: #fff;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: .8rem
        }

        .add-person {
            display: flex;
            gap: .5rem
        }

        .add-person input {
            flex: 1;
            padding: .75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px
        }

        .add-person button {
            padding: .75rem 1rem;
            background: #11998e;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer
        }

        .expense {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: .75rem
        }

        .expense-header {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .expense-header input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500
        }

        .expense-header button {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: .25rem .5rem;
            border-radius: 4px;
            cursor: pointer
        }

        .expense-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-top: .75rem
        }

        .expense-details select,
        .expense-details input {
            padding: .5rem;
            border: 1px solid #ddd;
            border-radius: 6px
        }

        .add-expense {
            width: 100%;
            padding: .75rem;
            background: #38ef7d;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600
        }

        .results {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border-radius: 15px;
            padding: 1.5rem;
            color: #fff
        }

        .results h3 {
            margin-bottom: 1rem
        }

        .result-item {
            background: rgba(255, 255, 255, .2);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: .5rem
        }

        .result-item .from {
            font-size: .9rem;
            opacity: .9
        }

        .result-item .amount {
            font-size: 1.5rem;
            font-weight: 700
        }

        .result-item .to {
            font-size: .9rem;
            opacity: .9
        }

        .no-results {
            text-align: center;
            opacity: .7
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>💳 Expense Splitter</h1>
        <div class="section">
            <h3>People</h3>
            <div class="people-list" id="peopleList"></div>
            <div class="add-person">
                <input type="text" id="personName" placeholder="Add person..."
                    onkeypress="if(event.key==='Enter')addPerson()">
                <button onclick="addPerson()">Add</button>
            </div>
        </div>
        <div class="section">
            <h3>Expenses</h3>
            <div id="expensesList"></div>
            <button class="add-expense" onclick="addExpense()">+ Add Expense</button>
        </div>
        <div class="results">
            <h3>💰 Who Owes Whom</h3>
            <div id="results">
                <div class="no-results">Add people and expenses to see results</div>
            </div>
        </div>
    </div>
    <script>
        let people = ['Alice', 'Bob', 'Charlie'];
        let expenses = [{ desc: 'Dinner', amount: 90, paidBy: 'Alice', splitWith: ['Alice', 'Bob', 'Charlie'] }];
        function renderPeople() {
            document.getElementById('peopleList').innerHTML = people.map((p, i) => `
                <div class="person-chip">${p}<button onclick="removePerson(${i})">×</button></div>
            `).join('');
            renderExpenses();
        }
        function addPerson() {
            const input = document.getElementById('personName');
            const name = input.value.trim();
            if (name && !people.includes(name)) { people.push(name); input.value = ''; renderPeople() }
        }
        function removePerson(i) { people.splice(i, 1); expenses = expenses.filter(e => e.paidBy !== people[i]); renderPeople(); calculate() }
        function renderExpenses() {
            document.getElementById('expensesList').innerHTML = expenses.map((e, i) => `
                <div class="expense">
                    <div class="expense-header">
                        <input value="${e.desc}" onchange="updateExpense(${i},'desc',this.value)">
                        <button onclick="removeExpense(${i})">×</button>
                    </div>
                    <div class="expense-details">
                        <input type="number" value="${e.amount}" placeholder="Amount" onchange="updateExpense(${i},'amount',parseFloat(this.value))">
                        <select onchange="updateExpense(${i},'paidBy',this.value)">
                            ${people.map(p => `<option ${e.paidBy === p ? 'selected' : ''}>${p}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `).join('');
            calculate();
        }
        function addExpense() { if (people.length < 2) return alert('Add at least 2 people'); expenses.push({ desc: 'New expense', amount: 0, paidBy: people[0], splitWith: [...people] }); renderExpenses() }
        function removeExpense(i) { expenses.splice(i, 1); renderExpenses() }
        function updateExpense(i, field, val) { expenses[i][field] = val; calculate() }
        function calculate() {
            if (people.length < 2 || expenses.length === 0) { document.getElementById('results').innerHTML = '<div class="no-results">Add people and expenses to see results</div>'; return }
            const balances = {}; people.forEach(p => balances[p] = 0);
            expenses.forEach(e => {
                const share = e.amount / people.length;
                people.forEach(p => balances[p] -= share);
                balances[e.paidBy] += e.amount;
            });
            const creditors = people.filter(p => balances[p] > 0.01).map(p => ({ name: p, amount: balances[p] }));
            const debtors = people.filter(p => balances[p] < -0.01).map(p => ({ name: p, amount: -balances[p] }));
            const transactions = [];
            while (creditors.length && debtors.length) {
                const c = creditors[0], d = debtors[0];
                const amount = Math.min(c.amount, d.amount);
                transactions.push({ from: d.name, to: c.name, amount: amount.toFixed(2) });
                c.amount -= amount; d.amount -= amount;
                if (c.amount < 0.01) creditors.shift();
                if (d.amount < 0.01) debtors.shift();
            }
            if (transactions.length === 0) {
                document.getElementById('results').innerHTML = '<div class="no-results">✅ All settled up!</div>';
            } else {
                document.getElementById('results').innerHTML = transactions.map(t => `
                    <div class="result-item">
                        <div class="from">${t.from} pays</div>
                        <div class="amount">$${t.amount}</div>
                        <div class="to">to ${t.to}</div>
                    </div>
                `).join('');
            }
        }
        renderPeople();
    </script>
</body>

</html>
