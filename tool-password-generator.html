<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #0f3460;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5)
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 1.5rem
        }

        .password-box {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            gap: .75rem;
            margin-bottom: 1.5rem
        }

        #password {
            flex: 1;
            background: transparent;
            border: none;
            color: #00d9ff;
            font-size: 1.25rem;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .copy-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: .75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600
        }

        .copy-btn:hover {
            background: #ff6b6b
        }

        .strength {
            height: 6px;
            border-radius: 3px;
            margin-bottom: 1.5rem;
            background: #333;
            overflow: hidden
        }

        .strength-bar {
            height: 100%;
            transition: all .3s
        }

        .form-group {
            margin-bottom: 1.25rem
        }

        label {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: .9rem;
            margin-bottom: .5rem
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00d9ff
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem
        }

        .option {
            display: flex;
            align-items: center;
            gap: .5rem;
            color: #aaa;
            font-size: .9rem
        }

        .option input {
            width: 18px;
            height: 18px;
            accent-color: #00d9ff
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔐 Password Generator</h1>
        <div class="password-box">
            <input type="text" id="password" readonly value="Click Generate!">
            <button class="copy-btn" onclick="copyPassword()">Copy</button>
        </div>
        <div class="strength">
            <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="form-group">
            <label>Length <span id="lengthVal">16</span></label>
            <input type="range" id="length" min="8" max="64" value="16"
                oninput="document.getElementById('lengthVal').textContent=this.value;generate()">
        </div>
        <div class="options">
            <label class="option"><input type="checkbox" id="upper" checked onchange="generate()">Uppercase
                (A-Z)</label>
            <label class="option"><input type="checkbox" id="lower" checked onchange="generate()">Lowercase
                (a-z)</label>
            <label class="option"><input type="checkbox" id="numbers" checked onchange="generate()">Numbers
                (0-9)</label>
            <label class="option"><input type="checkbox" id="symbols" checked onchange="generate()">Symbols
                (!@#$)</label>
        </div>
        <button class="btn" onclick="generate()">🔄 Generate Password</button>
    </div>
    <script>
        function generate() {
            const len = parseInt(document.getElementById('length').value);
            let chars = '';
            if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('numbers').checked) chars += '0123456789';
            if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
            let pwd = ''; for (let i = 0; i < len; i++)pwd += chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('password').value = pwd;
            // Strength
            let score = 0; if (len >= 12) score++; if (len >= 20) score++; if (/[A-Z]/.test(pwd)) score++; if (/[a-z]/.test(pwd)) score++; if (/[0-9]/.test(pwd)) score++; if (/[^A-Za-z0-9]/.test(pwd)) score++;
            const colors = ['#e74c3c', '#e74c3c', '#f39c12', '#f1c40f', '#2ecc71', '#27ae60', '#1abc9c'];
            const bar = document.getElementById('strengthBar'); bar.style.width = (score / 6 * 100) + '%'; bar.style.background = colors[score];
        }
        function copyPassword() { navigator.clipboard.writeText(document.getElementById('password').value); document.querySelector('.copy-btn').textContent = 'Copied!'; setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy', 1500) }
        generate();
    </script>
</body>

</html>
