<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #834d9b, #d04ed6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap
        }

        .opt {
            flex: 1;
            min-width: 120px
        }

        .opt label {
            display: block;
            font-size: .85rem;
            color: #666;
            margin-bottom: .25rem
        }

        .opt input,
        .opt select {
            width: 100%;
            padding: .75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem
        }

        .opt input:focus,
        .opt select:focus {
            outline: none;
            border-color: #834d9b
        }

        .check {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .9rem;
            color: #666
        }

        .btn-row {
            display: flex;
            gap: .75rem
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer
        }

        .btn-primary {
            background: linear-gradient(135deg, #834d9b, #d04ed6);
            color: #fff
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333
        }

        .output {
            margin-top: 1.5rem;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            max-height: 400px;
            overflow-y: auto
        }

        .output p {
            margin-bottom: 1rem;
            line-height: 1.7;
            color: #333
        }

        .output p:last-child {
            margin-bottom: 0
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: .85rem;
            color: #666
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📜 Lorem Ipsum Generator</h1>
        <div class="options">
            <div class="opt">
                <label>Type</label>
                <select id="type">
                    <option value="paragraphs">Paragraphs</option>
                    <option value="sentences">Sentences</option>
                    <option value="words">Words</option>
                </select>
            </div>
            <div class="opt">
                <label>Count</label>
                <input type="number" id="count" value="3" min="1" max="100">
            </div>
            <div class="opt" style="display:flex;align-items:flex-end">
                <label class="check"><input type="checkbox" id="startLorem" checked> Start with "Lorem ipsum..."</label>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="generate()">Generate</button>
            <button class="btn btn-secondary" onclick="copy()">Copy</button>
        </div>
        <div class="output" id="output">
            <p>Click Generate to create Lorem Ipsum text...</p>
        </div>
        <div class="stats">
            <span>Words: <strong id="wordCount">0</strong></span>
            <span>Characters: <strong id="charCount">0</strong></span>
        </div>
    </div>
    <script>
        const words = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'habitant', 'morbi', 'tristique', 'senectus', 'netus', 'malesuada', 'fames', 'turpis', 'egestas', 'integer', 'feugiat', 'scelerisque', 'varius', 'nunc', 'vel', 'risus', 'pharetra', 'porta', 'nibh', 'venenatis', 'cras', 'ornare', 'arcu', 'viverra', 'pellentesque', 'massa', 'placerat', 'vitae', 'proin', 'sagittis', 'nisl', 'rhoncus', 'mattis'];
        const startPhrase = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.';
        function randWord() { return words[Math.floor(Math.random() * words.length)] }
        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1) }
        function randSentence(min = 8, max = 16) { const len = Math.floor(Math.random() * (max - min + 1)) + min; let s = []; for (let i = 0; i < len; i++)s.push(randWord()); return capitalize(s.join(' ')) + '.' }
        function randParagraph(sentences = 5) { let p = []; for (let i = 0; i < sentences; i++)p.push(randSentence()); return p.join(' ') }
        function generate() {
            const type = document.getElementById('type').value;
            const count = parseInt(document.getElementById('count').value) || 1;
            const startWith = document.getElementById('startLorem').checked;
            let result = [];
            if (type === 'paragraphs') {
                for (let i = 0; i < count; i++) {
                    let p = randParagraph(Math.floor(Math.random() * 3) + 4);
                    if (i === 0 && startWith) p = startPhrase + ' ' + p;
                    result.push('<p>' + p + '</p>');
                }
            } else if (type === 'sentences') {
                let sents = [];
                for (let i = 0; i < count; i++) {
                    let s = randSentence();
                    if (i === 0 && startWith) s = startPhrase;
                    sents.push(s);
                }
                result.push('<p>' + sents.join(' ') + '</p>');
            } else {
                let w = [];
                if (startWith) w.push('Lorem', 'ipsum', 'dolor', 'sit', 'amet');
                while (w.length < count) w.push(randWord());
                result.push('<p>' + capitalize(w.slice(0, count).join(' ')) + '.</p>');
            }
            document.getElementById('output').innerHTML = result.join('');
            const text = document.getElementById('output').textContent;
            document.getElementById('wordCount').textContent = text.trim().split(/\s+/).length;
            document.getElementById('charCount').textContent = text.length;
        }
        function copy() { navigator.clipboard.writeText(document.getElementById('output').textContent) }
        generate();
    </script>
</body>

</html>
