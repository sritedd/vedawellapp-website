<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem
        }

        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 1rem
        }

        .tab:first-child {
            border-radius: 10px 0 0 10px
        }

        .tab:last-child {
            border-radius: 0 10px 10px 0
        }

        .tab.active {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: #fff
        }

        .form-group {
            margin-bottom: 1.25rem
        }

        label {
            display: block;
            color: #666;
            font-size: .9rem;
            margin-bottom: .5rem
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: monospace;
            font-size: .95rem;
            resize: vertical
        }

        textarea:focus {
            outline: none;
            border-color: #4ca1af
        }

        .btn-row {
            display: flex;
            gap: .75rem
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: .95rem
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: #fff
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333
        }

        .file-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1.5rem
        }

        .file-section h3 {
            font-size: .9rem;
            color: #666;
            margin-bottom: .75rem
        }

        .file-input {
            display: block;
            margin-bottom: .75rem
        }

        .result {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: monospace;
            font-size: .85rem;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            font-size: .85rem;
            color: #666
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔐 Base64 Encoder/Decoder</h1>
        <div class="tabs">
            <button class="tab active" onclick="setMode('encode')">Encode</button>
            <button class="tab" onclick="setMode('decode')">Decode</button>
        </div>
        <div id="encodeSection">
            <div class="form-group">
                <label>Text to Encode</label>
                <textarea id="encodeInput" placeholder="Enter text to encode..."></textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="encode()">Encode to Base64</button>
                <button class="btn btn-secondary" onclick="copyResult('encodeOutput')">Copy</button>
            </div>
            <div class="result" id="encodeOutput">Encoded result will appear here...</div>
        </div>
        <div id="decodeSection" style="display:none">
            <div class="form-group">
                <label>Base64 to Decode</label>
                <textarea id="decodeInput" placeholder="Enter Base64 string to decode..."></textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="decode()">Decode from Base64</button>
                <button class="btn btn-secondary" onclick="copyResult('decodeOutput')">Copy</button>
            </div>
            <div class="result" id="decodeOutput">Decoded result will appear here...</div>
        </div>
        <div class="file-section">
            <h3>📁 File to Base64</h3>
            <input type="file" class="file-input" id="fileInput" onchange="encodeFile()">
            <div class="result" id="fileOutput" style="display:none"></div>
            <button class="btn btn-secondary" style="width:100%;margin-top:.5rem"
                onclick="copyResult('fileOutput')">Copy File Base64</button>
        </div>
        <div class="stats">
            <span>Input length: <strong id="inputLen">0</strong></span>
            <span>Output length: <strong id="outputLen">0</strong></span>
        </div>
    </div>
    <script>
        let mode = 'encode';
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (m === 'encode' ? 0 : 1)));
            document.getElementById('encodeSection').style.display = m === 'encode' ? 'block' : 'none';
            document.getElementById('decodeSection').style.display = m === 'decode' ? 'block' : 'none';
        }
        function encode() {
            const input = document.getElementById('encodeInput').value;
            try {
                const output = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('encodeOutput').textContent = output;
                updateStats(input.length, output.length);
            } catch (e) { document.getElementById('encodeOutput').textContent = 'Error: ' + e.message }
        }
        function decode() {
            const input = document.getElementById('decodeInput').value;
            try {
                const output = decodeURIComponent(escape(atob(input)));
                document.getElementById('decodeOutput').textContent = output;
                updateStats(input.length, output.length);
            } catch (e) { document.getElementById('decodeOutput').textContent = 'Error: Invalid Base64 string' }
        }
        function encodeFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result;
                document.getElementById('fileOutput').textContent = base64;
                document.getElementById('fileOutput').style.display = 'block';
                updateStats(file.size, base64.length);
            };
            reader.readAsDataURL(file);
        }
        function copyResult(id) { navigator.clipboard.writeText(document.getElementById(id).textContent) }
        function updateStats(i, o) { document.getElementById('inputLen').textContent = i; document.getElementById('outputLen').textContent = o }
    </script>
</body>

</html>
