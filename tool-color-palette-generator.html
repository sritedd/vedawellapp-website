<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .palette {
            flex: 1;
            display: flex;
            width: 100%;
            height: 80%;
        }

        .color-col {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: flex 0.2s;
        }

        .color-col:hover {
            flex: 1.2;
        }

        .hex-code {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            background: rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            transition: transform 0.1s;
        }

        .hex-code:active {
            transform: scale(0.9);
        }

        .copied {
            position: absolute;
            top: 20%;
            color: white;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .controls {
            height: 20%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        button {
            background: #111;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: #333;
        }

        button:active {
            transform: scale(0.95);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="palette" id="palette">
        <!-- Columns generated by JS -->
    </div>

    <div class="controls">
        <div style="text-align:center">
            <button onclick="generate()">
                <span>🔄</span> Generate New Palette
            </button>
            <div class="subtitle">Press Spacebar</div>
        </div>
    </div>

    <script>
        function generate() {
            const container = document.getElementById('palette');
            container.innerHTML = '';

            // Generate 5 colors
            for (let i = 0; i < 5; i++) {
                const color = getRandomColor();
                const col = document.createElement('div');
                col.className = 'color-col';
                col.style.backgroundColor = color;

                // Determine text color for contrast (simple)
                // Convert hex to rgb to check brightness
                const brightness = getBrightness(color);
                const textColor = brightness > 128 ? 'black' : 'white';

                col.innerHTML = `
                    <div class="copied" style="color:${textColor}">Copied!</div>
                    <div class="hex-code" style="color:${textColor}" onclick="copy('${color}', this)">${color.toUpperCase()}</div>
                `;

                container.appendChild(col);
            }
        }

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function getBrightness(hex) {
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000;
        }

        function copy(text, el) {
            navigator.clipboard.writeText(text);
            const msg = el.previousElementSibling;
            msg.style.opacity = 1;
            setTimeout(() => msg.style.opacity = 0, 1000);
        }

        // Spacebar trigger
        document.body.onkeyup = function (e) {
            if (e.keyCode == 32) {
                generate();
            }
        }

        // Init
        generate();
    </script>
</body>

</html>
