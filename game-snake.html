<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px
        }

        h1 {
            color: #fff;
            margin-bottom: 1rem
        }

        .game-container {
            background: #0f0f23;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5)
        }

        canvas {
            display: block;
            border-radius: 10px;
            background: #1a1a2e
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            color: #888
        }

        .stats span {
            font-size: 1.25rem
        }

        .stats .score {
            color: #2ecc71;
            font-weight: 700
        }

        .stats .high {
            color: #f1c40f
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center
        }

        .btn {
            padding: .75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600
        }

        .btn-start {
            background: #2ecc71;
            color: #fff
        }

        .btn-pause {
            background: #3498db;
            color: #fff
        }

        .mobile-controls {
            display: none;
            margin-top: 1rem
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            justify-content: center
        }

        .dpad button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: #3a3a5c;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer
        }

        .dpad button:active {
            background: #667eea
        }

        .dpad .empty {
            background: transparent
        }

        @media(max-width:500px) {
            .mobile-controls {
                display: block
            }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px
        }

        .overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: .5rem
        }

        .overlay p {
            color: #888;
            margin-bottom: 1.5rem
        }

        .overlay .final-score {
            color: #2ecc71;
            font-size: 3rem;
            font-weight: 700
        }
    </style>
</head>

<body>
    <h1>🐍 Snake Game</h1>
    <div class="game-container">
        <div style="position:relative">
            <canvas id="game" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">Snake Game</h2>
                <p id="overlayText">Press Start or Space to play</p>
                <div class="final-score" id="finalScore"></div>
            </div>
        </div>
        <div class="stats">
            <span>Score: <span class="score" id="score">0</span></span>
            <span>Best: <span class="high" id="high">0</span></span>
        </div>
        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">▶ Start</button>
        </div>
        <div class="mobile-controls">
            <div class="dpad">
                <div class="empty"></div>
                <button onclick="changeDir(0,-1)">↑</button>
                <div class="empty"></div>
                <button onclick="changeDir(-1,0)">←</button>
                <div class="empty"></div>
                <button onclick="changeDir(1,0)">→</button>
                <div class="empty"></div>
                <button onclick="changeDir(0,1)">↓</button>
                <div class="empty"></div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20, tileCount = canvas.width / gridSize;
        let snake, food, dx, dy, score, gameLoop, speed, highScore = localStorage.getItem('snakeHigh') || 0;
        document.getElementById('high').textContent = highScore;

        function init() {
            snake = [{ x: 10, y: 10 }];
            food = spawnFood();
            dx = 0; dy = 0; score = 0; speed = 100;
            document.getElementById('score').textContent = 0;
        }
        function spawnFood() {
            let pos;
            do { pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) } }
            while (snake.some(s => s.x === pos.x && s.y === pos.y));
            return pos;
        }
        function draw() {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Grid
            ctx.strokeStyle = '#252547';
            for (let i = 0; i < tileCount; i++) { ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke() }
            // Food
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2); ctx.fill();
            // Snake
            snake.forEach((seg, i) => {
                const gradient = ctx.createRadialGradient(seg.x * gridSize + gridSize / 2, seg.y * gridSize + gridSize / 2, 0, seg.x * gridSize + gridSize / 2, seg.y * gridSize + gridSize / 2, gridSize / 2);
                gradient.addColorStop(0, i === 0 ? '#2ecc71' : '#27ae60');
                gradient.addColorStop(1, i === 0 ? '#27ae60' : '#1e8449');
                ctx.fillStyle = gradient;
                ctx.fillRect(seg.x * gridSize + 1, seg.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }
        function update() {
            if (dx === 0 && dy === 0) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { gameOver(); return }
            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                food = spawnFood();
                if (speed > 50) speed -= 2;
                clearInterval(gameLoop);
                gameLoop = setInterval(() => { update(); draw() }, speed);
            } else { snake.pop() }
        }
        function gameOver() {
            clearInterval(gameLoop);
            if (score > highScore) { highScore = score; localStorage.setItem('snakeHigh', highScore); document.getElementById('high').textContent = highScore }
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlayTitle').textContent = 'Game Over!';
            document.getElementById('overlayText').textContent = 'Press Start to play again';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('startBtn').textContent = '▶ Restart';
        }
        function startGame() {
            init();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('startBtn').textContent = '▶ Restart';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => { update(); draw() }, speed);
        }
        function changeDir(x, y) {
            if (x === 1 && dx === -1) return; if (x === -1 && dx === 1) return;
            if (y === 1 && dy === -1) return; if (y === -1 && dy === 1) return;
            dx = x; dy = y;
        }
        document.addEventListener('keydown', e => {
            if (e.key === ' ') { e.preventDefault(); if (document.getElementById('overlay').style.display !== 'none') startGame() }
            if (e.key === 'ArrowUp' || e.key === 'w') changeDir(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's') changeDir(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a') changeDir(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd') changeDir(1, 0);
        });
        init(); draw();
    </script>
</body>

</html>
