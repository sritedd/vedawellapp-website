<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .form-group {
            margin-bottom: 1.25rem
        }

        label {
            display: block;
            color: #666;
            font-size: .9rem;
            margin-bottom: .5rem
        }

        input {
            width: 100%;
            padding: .75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem
        }

        input:focus {
            outline: none;
            border-color: #11998e
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem
        }

        .results {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1.5rem
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: .75rem 0;
            border-bottom: 1px solid #e0e0e0
        }

        .result-row:last-child {
            border-bottom: none
        }

        .big {
            font-size: 1.5rem;
            font-weight: 700;
            color: #11998e
        }

        .chart {
            margin-top: 1.5rem;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: flex
        }

        .chart-principal {
            background: #11998e
        }

        .chart-interest {
            background: #ff6b6b
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            margin-top: .75rem;
            font-size: .85rem
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .legend span::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 3px
        }

        .legend .p::before {
            background: #11998e
        }

        .legend .i::before {
            background: #ff6b6b
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🏦 Loan Calculator</h1>
        <div class="form-group">
            <label>Loan Amount ($)</label>
            <input type="number" id="amount" value="250000" oninput="calculate()">
        </div>
        <div class="row">
            <div class="form-group">
                <label>Interest Rate (%)</label>
                <input type="number" id="rate" value="6.5" step="0.1" oninput="calculate()">
            </div>
            <div class="form-group">
                <label>Loan Term (Years)</label>
                <input type="number" id="years" value="30" oninput="calculate()">
            </div>
        </div>
        <div class="results">
            <div class="result-row"><span>Monthly Payment</span><span class="big" id="monthly">$0</span></div>
            <div class="result-row"><span>Total Payment</span><span id="totalPay">$0</span></div>
            <div class="result-row"><span>Total Interest</span><span id="totalInt">$0</span></div>
            <div class="chart">
                <div class="chart-principal" id="chartP"></div>
                <div class="chart-interest" id="chartI"></div>
            </div>
            <div class="legend"><span class="p">Principal</span><span class="i">Interest</span></div>
        </div>
    </div>
    <script>
        function calculate() {
            const P = parseFloat(document.getElementById('amount').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
            const n = (parseInt(document.getElementById('years').value) || 1) * 12;
            if (r === 0) { var M = P / n } else { var M = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) }
            const total = M * n; const interest = total - P;
            document.getElementById('monthly').textContent = '$' + M.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalPay').textContent = '$' + total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalInt').textContent = '$' + interest.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            const pPct = (P / total) * 100;
            document.getElementById('chartP').style.width = pPct + '%';
            document.getElementById('chartI').style.width = (100 - pPct) + '%';
        }
        calculate();
    </script>
</body>

</html>
