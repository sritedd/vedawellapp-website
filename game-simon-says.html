<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        body {
            background: #222;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .game-board {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #333;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .btn {
            width: 140px;
            height: 140px;
            position: absolute;
            border-radius: 20px;
            cursor: pointer;
            transition: opacity 0.1s;
            opacity: 0.6;
            border: 4px solid rgba(0, 0, 0, 0.2);
        }

        .btn:active,
        .btn.active {
            opacity: 1;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .green {
            top: 10px;
            left: 10px;
            background: #00ff00;
            border-top-left-radius: 100%;
        }

        .red {
            top: 10px;
            right: 10px;
            background: #ff0000;
            border-top-right-radius: 100%;
        }

        .yellow {
            bottom: 10px;
            left: 10px;
            background: #ffff00;
            border-bottom-left-radius: 100%;
        }

        .blue {
            bottom: 10px;
            right: 10px;
            background: #0000ff;
            border-bottom-right-radius: 100%;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: #333;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            border: 10px solid #222;
        }

        .level {
            font-size: 2rem;
            font-weight: bold;
        }

        .label {
            font-size: 0.8rem;
            color: #888;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
        }

        #startBtn {
            margin-top: 40px;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            background: white;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>Simon</h1>

    <div class="game-board">
        <div class="btn green" id="green" onclick="handleClick('green')"></div>
        <div class="btn red" id="red" onclick="handleClick('red')"></div>
        <div class="btn yellow" id="yellow" onclick="handleClick('yellow')"></div>
        <div class="btn blue" id="blue" onclick="handleClick('blue')"></div>

        <div class="center">
            <div class="level" id="level">--</div>
            <div class="label">LEVEL</div>
        </div>
    </div>

    <button id="startBtn" onclick="start()">START</button>

    <script>
        const colors = ['green', 'red', 'yellow', 'blue'];
        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let gameActive = false;

        // Sounds (Simulated with Frequency)
        const freqs = { green: 300, red: 400, yellow: 500, blue: 600, error: 150 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(color) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freqs[color];
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            setTimeout(() => osc.stop(), 500);
        }

        function flash(color) {
            const btn = document.getElementById(color);
            btn.classList.add('active');
            playSound(color);
            setTimeout(() => btn.classList.remove('active'), 300);
        }

        function start() {
            sequence = [];
            playerSequence = [];
            level = 0;
            gameActive = true;
            document.getElementById('startBtn').style.display = 'none';
            nextLevel();
        }

        function nextLevel() {
            level++;
            document.getElementById('level').innerText = level;
            playerSequence = [];

            sequence.push(colors[Math.floor(Math.random() * 4)]);

            // Play sequence
            let i = 0;
            const interval = setInterval(() => {
                flash(sequence[i]);
                i++;
                if (i >= sequence.length) clearInterval(interval);
            }, 800);
        }

        function handleClick(color) {
            if (!gameActive) return;

            flash(color);
            playerSequence.push(color);

            // Check
            const idx = playerSequence.length - 1;
            if (playerSequence[idx] !== sequence[idx]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                setTimeout(nextLevel, 1000);
            }
        }

        function gameOver() {
            gameActive = false;
            playSound('error');
            document.getElementById('level').innerText = '!!';
            document.body.style.background = '#500';
            setTimeout(() => {
                document.body.style.background = '#222';
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('startBtn').innerText = 'TRY AGAIN';
            }, 1000);
        }
    </script>
</body>

</html>
