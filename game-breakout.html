<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        body {
            margin: 0;
            background: #202028;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        canvas {
            background: #000;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            max-width: 100%;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        #startBtn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.1s;
            box-shadow: 0 4px 0 #ad1457;
        }

        #startBtn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .stats {
            font-size: 1.2rem;
            width: 480px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>Breakout</h1>
    <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Lives: <span id="lives">3</span></span>
    </div>
    <canvas id="canvas" width="480" height="320"></canvas>
    <button id="startBtn" onclick="startGame()">PLAY</button>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let ballRadius = 6;
        let x, y, dx, dy;
        const paddleHeight = 10;
        let paddleWidth = 75;
        let paddleX;

        let rightPressed = false;
        let leftPressed = false;

        let brickRowCount = 5;
        let brickColumnCount = 6;
        let brickWidth = 60;
        let brickHeight = 15;
        let brickPadding = 10;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 35;

        let bricks = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;

        // Init/Reset
        function init() {
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 3;
            dy = -3;
            paddleX = (canvas.width - paddleWidth) / 2;
            score = 0;
            lives = 3;

            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;

            // Create bricks
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // Controls
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        canvas.addEventListener("mousemove", mouseMoveHandler, false);
        canvas.addEventListener("touchmove", touchHandler, { passive: false });

        function keyDownHandler(e) {
            if (e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
            else if (e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
        }

        function keyUpHandler(e) {
            if (e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
            else if (e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
        }

        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        function touchHandler(e) {
            e.preventDefault();
            const relativeX = e.touches[0].clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        // Logic
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status == 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            // Color variation logic
                            score++;
                            document.getElementById('score').innerText = score;
                            if (score == brickRowCount * brickColumnCount) {
                                alert("YOU WIN, CONGRATS!");
                                gameRunning = false;
                                document.getElementById('startBtn').style.display = 'block';
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#e91e63";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status == 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // Row colors
                        const colors = ['#f44336', '#ff9800', '#ffeb3b', '#4caf50', '#2196f3'];
                        ctx.fillStyle = colors[r] || "#0095DD";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function draw() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // Wall collision
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    // Hit paddle
                    // Add some English based on hit position
                    let hitPoint = x - (paddleX + paddleWidth / 2);
                    dx = hitPoint * 0.15; // spin effect
                    dy = -dy;
                    // Speed up slightly?
                } else {
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    if (!lives) {
                        alert("GAME OVER");
                        gameRunning = false;
                        document.getElementById('startBtn').style.display = 'block';
                    } else {
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 3;
                        dy = -3;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            // Move
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            }
            else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            x += dx;
            y += dy;

            if (gameRunning) requestAnimationFrame(draw);
        }

        function startGame() {
            if (gameRunning) return;
            init();
            gameRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            draw();
        }
    </script>
</body>

</html>
