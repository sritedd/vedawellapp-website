<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #fff7ed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #431407;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #ea580c;
        }

        .preview-area {
            width: 100%;
            aspect-ratio: 16/9;
            background: #27272a;
            margin: 2rem 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #71717a;
            border: 2px dashed #52525b;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-start {
            background: #ea580c;
            color: white;
        }

        .btn-start:hover {
            background: #c2410c;
        }

        .btn-stop {
            background: #ef4444;
            color: white;
            display: none;
        }

        .btn-down {
            background: #22c55e;
            color: white;
            display: none;
        }

        .status {
            margin-top: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ea580c;
            display: none;
        }

        .status.recording {
            display: block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎥 Screen Recorder</h1>
        <p>Record your screen instantly. No installation required.</p>

        <div class="preview-area" id="previewContainer">
            <video id="preview" autoplay muted></video>
            <div id="placeholder">Click "Start Recording" to select screen</div>
        </div>

        <div class="status" id="status">🔴 Recording in progress... (Stop sharing to finish)</div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startRecording()">⏺ Start Recording</button>
            <button class="btn-stop" id="stopBtn" onclick="stopRecording()">⏹ Stop</button>
            <button class="btn-down" id="downloadBtn" onclick="download()">💾 Download Video</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let stream;

        async function startRecording() {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { mediaSource: "screen" },
                    audio: true
                });

                document.getElementById('placeholder').style.display = 'none';
                const video = document.getElementById('preview');
                video.srcObject = stream;

                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    document.getElementById('status').classList.remove('recording');
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('downloadBtn').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('startBtn').innerText = '⏺ Record Again';

                    // Stop tracks
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();

                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'none';
                document.getElementById('status').classList.add('recording');
                recordedChunks = [];

            } catch (err) {
                console.error("Error: " + err);
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
        }

        function download() {
            const blob = new Blob(recordedChunks, {
                type: "video/webm"
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            document.body.appendChild(a);
            a.style = "display: none";
            a.href = url;
            a.download = "recording.webm";
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
