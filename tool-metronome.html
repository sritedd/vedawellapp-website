<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Metronome</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #222;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            background: #333;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .bpm-display {
            font-size: 5rem;
            font-weight: bold;
            color: #4ade80;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }

        .bpm-label {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .slider-container {
            margin: 2rem 0;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: #555;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #4ade80;
            border-radius: 50%;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .adjust-btn {
            background: #444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .adjust-btn:hover {
            background: #555;
        }

        .play-btn {
            background: #4ade80;
            color: #222;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn.playing {
            background: #ef4444;
            color: white;
        }

        .beat-indicator {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 2rem;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: #444;
            border-radius: 50%;
            transition: background 0.1s;
        }

        .dot.active {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .dot.active-accent {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .settings {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        select {
            background: #222;
            color: white;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎹 <span style="color:#4ade80">Metronome</span></h1>

        <div class="bpm-display" id="bpm">120</div>
        <div class="bpm-label">BPM</div>

        <div class="slider-container">
            <input type="range" min="40" max="218" value="120" id="slider" oninput="updateBpm(this.value)">
        </div>

        <div class="controls">
            <button class="adjust-btn" onclick="adjust(-1)">-</button>
            <button class="play-btn" id="playBtn" onclick="toggle()">▶</button>
            <button class="adjust-btn" onclick="adjust(1)">+</button>
        </div>

        <div class="settings">
            <select id="measure" onchange="createDots()">
                <option value="4">4/4</option>
                <option value="3">3/4</option>
                <option value="2">2/4</option>
                <option value="6">6/8</option>
            </select>
        </div>

        <div class="beat-indicator" id="dots"></div>
    </div>

    <script>
        let bpm = 120;
        let isPlaying = false;
        let audioCtx = null;
        let intervalId = null;
        let nextNoteTime = 0.0;
        let currentBeat = 0;
        const lookahead = 25.0; // ms
        const scheduleAheadTime = 0.1; // s

        function updateBpm(val) {
            bpm = Math.min(218, Math.max(40, Number(val)));
            document.getElementById('bpm').textContent = bpm;
            document.getElementById('slider').value = bpm;
        }

        function adjust(delta) {
            updateBpm(bpm + delta);
        }

        function createDots() {
            const count = document.getElementById('measure').value;
            const container = document.getElementById('dots');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                container.appendChild(d);
            }
            currentBeat = 0;
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += secondsPerBeat;
            currentBeat = (currentBeat + 1) % document.getElementById('measure').value;
        }

        function scheduleNote(beatNumber, time) {
            // Visual
            // We use standard setTimeout for visual sync roughly
            // AudioContext time is precise, visuals can lag slightly
            const osc = audioCtx.createOscillator();
            const envelope = audioCtx.createGain();

            osc.frequency.value = (beatNumber === 0) ? 1000 : 800;
            envelope.gain.value = 1;
            envelope.gain.exponentialRampToValueAtTime(1, time + 0.001);
            envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.02);

            osc.connect(envelope);
            envelope.connect(audioCtx.destination);

            osc.start(time);
            osc.stop(time + 0.03);

            // Visual Sync using Draw loop would be better but simple timeout works for basic tool
            setTimeout(() => {
                const dots = document.querySelectorAll('.dot');
                dots.forEach(d => d.className = 'dot');
                if (dots[beatNumber]) {
                    dots[beatNumber].classList.add(beatNumber === 0 ? 'active-accent' : 'active');
                }
            }, (time - audioCtx.currentTime) * 1000);
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentBeat, nextNoteTime);
                nextNote();
            }
            if (isPlaying) {
                intervalId = setTimeout(scheduler, lookahead);
            }
        }

        function toggle() {
            const btn = document.getElementById('playBtn');
            isPlaying = !isPlaying;

            if (isPlaying) {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                currentBeat = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
                btn.textContent = '⏸';
                btn.classList.add('playing');
            } else {
                clearTimeout(intervalId);
                btn.textContent = '▶';
                btn.classList.remove('playing');
            }
        }

        createDots();
    </script>
</body>

</html>
