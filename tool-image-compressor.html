<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            min-height: 100vh;
            padding: 20px
        }

        .container {
            max-width: 900px;
            margin: 0 auto
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 1.5rem
        }

        .upload-zone {
            background: #1a1a2e;
            border: 2px dashed #3a3a5c;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all .3s;
            margin-bottom: 1.5rem
        }

        .upload-zone:hover {
            border-color: #667eea;
            background: #252547
        }

        .upload-zone .icon {
            font-size: 3rem;
            margin-bottom: 1rem
        }

        .upload-zone h3 {
            color: #fff;
            margin-bottom: .5rem
        }

        .upload-zone p {
            color: #888
        }

        .controls {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem
        }

        .slider-row label {
            color: #888;
            min-width: 100px
        }

        .slider-row input[type="range"] {
            flex: 1;
            accent-color: #667eea
        }

        .slider-row span {
            color: #fff;
            min-width: 60px;
            text-align: right
        }

        .format-btns {
            display: flex;
            gap: .5rem
        }

        .format-btn {
            flex: 1;
            padding: .75rem;
            background: #252547;
            border: none;
            border-radius: 10px;
            color: #888;
            cursor: pointer
        }

        .format-btn.active {
            background: #667eea;
            color: #fff
        }

        .preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem
        }

        @media(max-width:700px) {
            .preview {
                grid-template-columns: 1fr
            }
        }

        .preview-box {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 1rem;
            text-align: center
        }

        .preview-box h3 {
            color: #888;
            font-size: .85rem;
            margin-bottom: .75rem
        }

        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px
        }

        .preview-box .stats {
            margin-top: .75rem;
            font-size: .9rem;
            color: #888
        }

        .preview-box .stats span {
            color: #00d9ff;
            font-weight: 600
        }

        .download-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1.5rem
        }

        .download-btn:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .savings {
            text-align: center;
            padding: 1rem;
            background: #252547;
            border-radius: 10px;
            margin-top: 1rem
        }

        .savings .big {
            font-size: 2rem;
            font-weight: 700;
            color: #2ecc71
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🗜️ Image Compressor</h1>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage()">
            <div class="icon">📁</div>
            <h3>Drop image here or click to upload</h3>
            <p>Supports JPG, PNG, WebP • Max 10MB</p>
        </div>
        <div class="controls">
            <div class="slider-row">
                <label>Quality</label>
                <input type="range" id="quality" min="10" max="100" value="80" oninput="compress()">
                <span id="qualityVal">80%</span>
            </div>
            <div class="slider-row">
                <label>Max Width</label>
                <input type="range" id="maxWidth" min="100" max="4000" value="1920" step="100" oninput="compress()">
                <span id="widthVal">1920px</span>
            </div>
            <div class="slider-row">
                <label>Format</label>
                <div class="format-btns">
                    <button class="format-btn active" onclick="setFormat('jpeg')">JPEG</button>
                    <button class="format-btn" onclick="setFormat('png')">PNG</button>
                    <button class="format-btn" onclick="setFormat('webp')">WebP</button>
                </div>
            </div>
        </div>
        <div class="preview">
            <div class="preview-box">
                <h3>Original</h3>
                <img id="originalImg" src="">
                <div class="stats">Size: <span id="originalSize">-</span></div>
            </div>
            <div class="preview-box">
                <h3>Compressed</h3>
                <img id="compressedImg" src="">
                <div class="stats">Size: <span id="compressedSize">-</span></div>
            </div>
        </div>
        <div class="savings" id="savings" style="display:none">
            <div>Space saved</div>
            <div class="big" id="savedPercent">0%</div>
        </div>
        <button class="download-btn" id="downloadBtn" disabled onclick="download()">💾 Download Compressed
            Image</button>
    </div>
    <script>
        let originalFile, compressedBlob, format = 'jpeg';
        function setFormat(f) { format = f; document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === f)); compress() }
        function loadImage() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            originalFile = file;
            document.getElementById('originalSize').textContent = formatBytes(file.size);
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('originalImg').src = e.target.result; compress() };
            reader.readAsDataURL(file);
        }
        function compress() {
            if (!originalFile) return;
            const quality = parseInt(document.getElementById('quality').value) / 100;
            const maxWidth = parseInt(document.getElementById('maxWidth').value);
            document.getElementById('qualityVal').textContent = Math.round(quality * 100) + '%';
            document.getElementById('widthVal').textContent = maxWidth + 'px';
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                canvas.toBlob(blob => {
                    compressedBlob = blob;
                    document.getElementById('compressedImg').src = URL.createObjectURL(blob);
                    document.getElementById('compressedSize').textContent = formatBytes(blob.size);
                    const saved = ((originalFile.size - blob.size) / originalFile.size * 100);
                    document.getElementById('savedPercent').textContent = saved.toFixed(1) + '%';
                    document.getElementById('savedPercent').style.color = saved > 0 ? '#2ecc71' : '#e74c3c';
                    document.getElementById('savings').style.display = 'block';
                    document.getElementById('downloadBtn').disabled = false;
                }, 'image/' + format, format === 'png' ? undefined : quality);
            };
            img.src = document.getElementById('originalImg').src;
        }
        function download() {
            if (!compressedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(compressedBlob);
            link.download = 'compressed.' + format;
            link.click();
        }
        function formatBytes(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(2) + ' MB' }
    </script>
</body>

</html>
