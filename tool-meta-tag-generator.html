<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #334155;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media(max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            grid-column: 1/-1;
            text-align: center;
            color: #1e293b;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #1e293b;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus,
        textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .preview-box {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 1rem;
            position: relative;
        }

        .tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 0.5rem;
            font-weight: 600;
            color: #64748b;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .google-preview {
            border: 1px solid #dfe1e5;
            padding: 1rem;
            border-radius: 8px;
            background: white;
            margin-top: 1rem;
        }

        .g-title {
            color: #1a0dab;
            font-size: 1.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .g-url {
            color: #006621;
            font-size: 0.9rem;
            margin: 2px 0;
        }

        .g-desc {
            color: #545454;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🏷️ Meta Tag Generator</h1>

        <!-- Input Section -->
        <div class="card">
            <h2>Site Information</h2>
            <div class="form-group">
                <label>Page Title (Suggest 50-60 chars)</label>
                <input type="text" id="title" placeholder="My Awesome Website" oninput="generate()">
                <div style="font-size: 0.8rem; text-align: right; color: #64748b; margin-top: 2px;">
                    <span id="titleCount">0</span>/60
                </div>
            </div>

            <div class="form-group">
                <label>Description (Suggest 150-160 chars)</label>
                <textarea id="desc" placeholder="A brief description of your content..."
                    oninput="generate()"></textarea>
                <div style="font-size: 0.8rem; text-align: right; color: #64748b; margin-top: 2px;">
                    <span id="descCount">0</span>/160
                </div>
            </div>

            <div class="form-group">
                <label>Keywords (Comma separated)</label>
                <input type="text" id="keywords" placeholder="web, tools, generator" oninput="generate()">
            </div>

            <div class="form-group">
                <label>Author</label>
                <input type="text" id="author" placeholder="Your Name" oninput="generate()">
            </div>

            <div class="form-group">
                <label>Viewport/Mobile Friendly</label>
                <select id="viewport" onchange="generate()">
                    <option value="yes">Yes (Responsive)</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Robots</label>
                <select id="robots" onchange="generate()">
                    <option value="index, follow">Index, Follow (Default)</option>
                    <option value="noindex, follow">No Index, Follow</option>
                    <option value="index, nofollow">Index, No Follow</option>
                    <option value="noindex, nofollow">No Index, No Follow</option>
                </select>
            </div>

            <div class="form-group">
                <label>Theme Color</label>
                <div style="display:flex; gap: 0.5rem">
                    <input type="color" id="color" value="#2563eb" style="width: 50px; padding: 0;"
                        oninput="generate()">
                    <input type="text" id="colorTex" value="#2563eb" oninput="generate()">
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="card">
            <div style="margin-bottom: 1rem;">
                <button class="tab-btn active" onclick="setMode('code')">Code</button>
                <button class="tab-btn" onclick="setMode('preview')">Google Preview</button>
            </div>

            <div id="codeArea">
                <div class="preview-box">
                    <button class="copy-btn" onclick="copy()">Copy</button>
                    <code id="output"></code>
                </div>
            </div>

            <div id="previewArea" style="display:none">
                <div class="google-preview">
                    <div class="g-title" id="gTitle">Page Title Example</div>
                    <div class="g-url">www.example.com</div>
                    <div class="g-desc" id="gDesc">This is how your page description will look in Google search results.
                        Make sure it is catchy and relevant.</div>
                </div>
                <p style="margin-top: 1rem; font-size: 0.9rem; color: #64748b;">* This is a simulation. Actual
                    appearance may vary.</p>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const title = document.getElementById('title').value || 'Page Title';
            const desc = document.getElementById('desc').value;
            const keywords = document.getElementById('keywords').value;
            const author = document.getElementById('author').value;
            const viewport = document.getElementById('viewport').value;
            const robots = document.getElementById('robots').value;
            const color = document.getElementById('color').value;

            document.getElementById('colorTex').value = color; // Sync hex

            // Update Counts
            document.getElementById('titleCount').textContent = title.length;
            document.getElementById('descCount').textContent = desc.length;
            document.getElementById('titleCount').style.color = title.length > 60 ? '#ef4444' : '#64748b';
            document.getElementById('descCount').style.color = desc.length > 160 ? '#ef4444' : '#64748b';

            // Build HTML
            let html = `<!-- Primary Meta Tags -->\n`;
            html += `<title>${title}</title>\n`;
            html += `<meta name="title" content="${title}">\n`;
            if (desc) html += `<meta name="description" content="${desc}">\n`;
            if (keywords) html += `<meta name="keywords" content="${keywords}">\n`;

            html += `\n<!-- General -->\n`;
            html += `<meta name="robots" content="${robots}">\n`;
            if (author) html += `<meta name="author" content="${author}">\n`;
            if (viewport === 'yes') html += `<meta name="viewport" content="width=device-width, initial-scale=1.0">\n`;
            html += `<meta name="theme-color" content="${color}">\n`;
            html += `<meta charset="UTF-8">\n`;

            document.getElementById('output').textContent = html;

            // Update Preview
            document.getElementById('gTitle').textContent = title;
            document.getElementById('gDesc').textContent = desc || "No description provided.";
        }

        function setMode(mode) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === (mode === 'code' ? 0 : 1)));
            document.getElementById('codeArea').style.display = mode === 'code' ? 'block' : 'none';
            document.getElementById('previewArea').style.display = mode === 'preview' ? 'block' : 'none';
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('output').textContent);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        }

        generate();
    </script>
</body>

</html>
