<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #fdf4ff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            border: 1px solid #f0abfc;
        }

        h1 {
            text-align: center;
            color: #86198f;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 2px solid #e879f9;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(232, 121, 249, 0.2);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            font-size: 1rem;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-encode {
            background: #d946ef;
            color: white;
        }

        .btn-encode:hover {
            background: #c026d3;
        }

        .btn-decode {
            background: #a855f7;
            color: white;
        }

        .btn-decode:hover {
            background: #9333ea;
        }

        .label {
            font-weight: bold;
            color: #701a75;
            margin-bottom: 0.5rem;
            display: block;
        }

        #result {
            background: #fae8ff;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            min-height: 50px;
            color: #4a044e;
        }

        .actions {
            text-align: right;
            margin-top: 0.5rem;
        }

        .copy-link {
            color: #86198f;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .copy-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔗 URL Encoder/Decoder</h1>

        <label class="label">Input</label>
        <textarea id="input" placeholder="Paste text or URL here..."></textarea>

        <div class="controls">
            <button class="btn-encode" onclick="process('encode')">Encode</button>
            <button class="btn-decode" onclick="process('decode')">Decode</button>
        </div>

        <label class="label">Result</label>
        <textarea id="result" readonly></textarea>

        <div class="actions">
            <span class="copy-link" onclick="copy()">Copy Result</span>
        </div>
    </div>

    <script>
        function process(mode) {
            const input = document.getElementById('input').value;
            const outputEl = document.getElementById('result');

            try {
                if (mode === 'encode') {
                    outputEl.value = encodeURIComponent(input);
                } else {
                    outputEl.value = decodeURIComponent(input);
                }
            } catch (e) {
                outputEl.value = "Error: Invalid format";
            }
        }

        function copy() {
            const el = document.getElementById('result');
            el.select();
            document.execCommand('copy');
            alert("Copied to clipboard!");
        }
    </script>
</body>

</html>
