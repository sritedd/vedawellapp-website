<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator Pro | Create Professional Invoices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        .app-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            min-height: 100vh;
        }

        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-card);
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 100vh;
            border-right: 1px solid var(--border);
        }

        .sidebar h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .section:last-child {
            border-bottom: none;
        }

        .section h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.625rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .logo-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-preview {
            width: 60px;
            height: 60px;
            background: var(--bg-input);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .logo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .logo-preview span {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-block {
            width: 100%;
            padding: 0.75rem;
        }

        /* Line Items */
        .line-item {
            background: var(--bg-input);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .line-item-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 30px;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .line-item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 30px;
            gap: 0.5rem;
            align-items: center;
        }

        .line-item-row input {
            padding: 0.5rem;
            font-size: 0.85rem;
        }

        .remove-item {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 1rem;
        }

        .add-item-btn {
            margin-top: 0.5rem;
        }

        /* Preview */
        .preview-area {
            padding: 2rem;
            overflow-y: auto;
            background: #64748b;
            display: flex;
            justify-content: center;
        }

        .invoice-preview {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 40px;
            color: #1e293b;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .invoice-logo img {
            max-height: 60px;
            max-width: 200px;
        }

        .invoice-title {
            text-align: right;
        }

        .invoice-title h1 {
            font-size: 2.5rem;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }

        .invoice-title .invoice-number {
            font-size: 1rem;
            color: #64748b;
        }

        .invoice-parties {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .party h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .party .name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .party .details {
            font-size: 0.9rem;
            color: #475569;
            white-space: pre-line;
        }

        .invoice-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .meta-item label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            display: block;
        }

        .meta-item span {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .invoice-table th {
            background: #1e293b;
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .invoice-table th:last-child,
        .invoice-table td:last-child {
            text-align: right;
        }

        .invoice-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        .invoice-totals {
            display: flex;
            justify-content: flex-end;
        }

        .totals-table {
            width: 280px;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .totals-row.grand-total {
            border-bottom: none;
            border-top: 2px solid #1e293b;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            padding-top: 15px;
        }

        .invoice-notes {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .invoice-notes h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .invoice-notes p {
            font-size: 0.9rem;
            color: #475569;
            white-space: pre-line;
        }

        .invoice-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .actions .btn {
            flex: 1;
        }

        @media print {
            body {
                background: white;
            }

            .sidebar {
                display: none;
            }

            .preview-area {
                padding: 0;
                background: white;
            }

            .invoice-preview {
                box-shadow: none;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h1>📄 Invoice Generator Pro</h1>
            <p>Create professional invoices in seconds</p>

            <!-- Your Business -->
            <div class="section">
                <h2>Your Business</h2>
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="businessName" placeholder="Your Business Name" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Your Details (Address, Email, Phone)</label>
                    <textarea id="businessDetails"
                        placeholder="123 Business St&#10;City, State 12345&#10;email@example.com"
                        oninput="updatePreview()"></textarea>
                </div>
                <div class="form-group">
                    <label>Logo</label>
                    <div class="logo-upload">
                        <div class="logo-preview" id="logoPreview">
                            <span>No logo</span>
                        </div>
                        <input type="file" id="logoInput" accept="image/*" onchange="handleLogo(event)"
                            style="display:none">
                        <button class="btn btn-secondary"
                            onclick="document.getElementById('logoInput').click()">Upload</button>
                        <button class="btn btn-secondary" onclick="removeLogo()">Remove</button>
                    </div>
                </div>
            </div>

            <!-- Client -->
            <div class="section">
                <h2>Bill To</h2>
                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" id="clientName" placeholder="Client or Company Name" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Client Details</label>
                    <textarea id="clientDetails" placeholder="Client address, email, etc."
                        oninput="updatePreview()"></textarea>
                </div>
            </div>

            <!-- Invoice Details -->
            <div class="section">
                <h2>Invoice Details</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Invoice Number</label>
                        <input type="text" id="invoiceNumber" value="INV-001" oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select id="currency" onchange="updatePreview()">
                            <option value="$">$ USD</option>
                            <option value="A$">A$ AUD</option>
                            <option value="€">€ EUR</option>
                            <option value="£">£ GBP</option>
                            <option value="₹">₹ INR</option>
                            <option value="¥">¥ JPY</option>
                            <option value="C$">C$ CAD</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Issue Date</label>
                        <input type="date" id="issueDate" oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="dueDate" oninput="updatePreview()">
                    </div>
                </div>
            </div>

            <!-- Line Items -->
            <div class="section">
                <h2>Line Items</h2>
                <div class="line-item-header">
                    <span style="font-size:0.75rem;color:var(--text-muted)">Description</span>
                    <span style="font-size:0.75rem;color:var(--text-muted)">Qty</span>
                    <span style="font-size:0.75rem;color:var(--text-muted)">Rate</span>
                    <span></span>
                </div>
                <div id="lineItems">
                    <!-- Items added here -->
                </div>
                <button class="btn btn-secondary btn-block add-item-btn" onclick="addLineItem()">+ Add Item</button>
            </div>

            <!-- Tax -->
            <div class="section">
                <h2>Tax</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tax Rate (%)</label>
                        <input type="number" id="taxRate" value="0" min="0" max="100" step="0.1"
                            oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Tax Label</label>
                        <input type="text" id="taxLabel" value="GST" oninput="updatePreview()">
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="section">
                <h2>Notes & Payment Info</h2>
                <div class="form-group">
                    <label>Notes / Payment Instructions</label>
                    <textarea id="notes" placeholder="Payment terms, bank details, thank you message..."
                        oninput="updatePreview()"></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button class="btn btn-success" onclick="printInvoice()">🖨️ Print / PDF</button>
                <button class="btn btn-primary" onclick="saveInvoice()">💾 Save</button>
                <button class="btn btn-secondary" onclick="loadInvoice()">📂 Load</button>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-area">
            <div class="invoice-preview" id="invoicePreview">
                <!-- Invoice content rendered here -->
            </div>
        </div>
    </div>

    <script>
        let lineItems = [];
        let logoData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Set default dates
            const today = new Date();
            document.getElementById('issueDate').value = today.toISOString().split('T')[0];

            const dueDate = new Date(today);
            dueDate.setDate(dueDate.getDate() + 14);
            document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];

            // Add initial line item
            addLineItem();
            updatePreview();
        });

        function addLineItem() {
            lineItems.push({ description: '', qty: 1, rate: 0 });
            renderLineItems();
            updatePreview();
        }

        function removeLineItem(index) {
            lineItems.splice(index, 1);
            renderLineItems();
            updatePreview();
        }

        function updateLineItem(index, field, value) {
            lineItems[index][field] = field === 'description' ? value : parseFloat(value) || 0;
            updatePreview();
        }

        function renderLineItems() {
            const container = document.getElementById('lineItems');
            container.innerHTML = lineItems.map((item, i) => `
                <div class="line-item-row">
                    <input type="text" placeholder="Item description" value="${item.description}" 
                           onchange="updateLineItem(${i}, 'description', this.value)">
                    <input type="number" placeholder="1" value="${item.qty}" min="0" step="0.5"
                           onchange="updateLineItem(${i}, 'qty', this.value)">
                    <input type="number" placeholder="0.00" value="${item.rate}" min="0" step="0.01"
                           onchange="updateLineItem(${i}, 'rate', this.value)">
                    <button class="remove-item" onclick="removeLineItem(${i})">×</button>
                </div>
            `).join('');
        }

        function handleLogo(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    logoData = e.target.result;
                    document.getElementById('logoPreview').innerHTML = `<img src="${logoData}" alt="Logo">`;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeLogo() {
            logoData = null;
            document.getElementById('logoPreview').innerHTML = '<span>No logo</span>';
            updatePreview();
        }

        function formatCurrency(amount) {
            const currency = document.getElementById('currency').value;
            return currency + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function updatePreview() {
            const businessName = document.getElementById('businessName').value || 'Your Business';
            const businessDetails = document.getElementById('businessDetails').value || '';
            const clientName = document.getElementById('clientName').value || 'Client Name';
            const clientDetails = document.getElementById('clientDetails').value || '';
            const invoiceNumber = document.getElementById('invoiceNumber').value || 'INV-001';
            const issueDate = document.getElementById('issueDate').value;
            const dueDate = document.getElementById('dueDate').value;
            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            const taxLabel = document.getElementById('taxLabel').value || 'Tax';
            const notes = document.getElementById('notes').value || '';

            // Calculate totals
            let subtotal = 0;
            lineItems.forEach(item => {
                subtotal += item.qty * item.rate;
            });
            const taxAmount = subtotal * (taxRate / 100);
            const total = subtotal + taxAmount;

            const preview = document.getElementById('invoicePreview');
            preview.innerHTML = `
                <div class="invoice-header">
                    <div class="invoice-logo">
                        ${logoData ? `<img src="${logoData}" alt="Logo">` : ''}
                    </div>
                    <div class="invoice-title">
                        <h1>INVOICE</h1>
                        <div class="invoice-number">${invoiceNumber}</div>
                    </div>
                </div>

                <div class="invoice-parties">
                    <div class="party">
                        <h3>From</h3>
                        <div class="name">${businessName}</div>
                        <div class="details">${businessDetails}</div>
                    </div>
                    <div class="party">
                        <h3>Bill To</h3>
                        <div class="name">${clientName}</div>
                        <div class="details">${clientDetails}</div>
                    </div>
                </div>

                <div class="invoice-meta">
                    <div class="meta-item">
                        <label>Invoice Number</label>
                        <span>${invoiceNumber}</span>
                    </div>
                    <div class="meta-item">
                        <label>Issue Date</label>
                        <span>${formatDate(issueDate)}</span>
                    </div>
                    <div class="meta-item">
                        <label>Due Date</label>
                        <span>${formatDate(dueDate)}</span>
                    </div>
                </div>

                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${lineItems.map(item => `
                            <tr>
                                <td>${item.description || '-'}</td>
                                <td>${item.qty}</td>
                                <td>${formatCurrency(item.rate)}</td>
                                <td>${formatCurrency(item.qty * item.rate)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div class="invoice-totals">
                    <div class="totals-table">
                        <div class="totals-row">
                            <span>Subtotal</span>
                            <span>${formatCurrency(subtotal)}</span>
                        </div>
                        ${taxRate > 0 ? `
                            <div class="totals-row">
                                <span>${taxLabel} (${taxRate}%)</span>
                                <span>${formatCurrency(taxAmount)}</span>
                            </div>
                        ` : ''}
                        <div class="totals-row grand-total">
                            <span>Total</span>
                            <span>${formatCurrency(total)}</span>
                        </div>
                    </div>
                </div>

                ${notes ? `
                    <div class="invoice-notes">
                        <h4>Notes / Payment Info</h4>
                        <p>${notes}</p>
                    </div>
                ` : ''}

                <div class="invoice-footer">
                    Thank you for your business!
                </div>
            `;
        }

        function printInvoice() {
            window.print();
        }

        function saveInvoice() {
            const data = {
                businessName: document.getElementById('businessName').value,
                businessDetails: document.getElementById('businessDetails').value,
                clientName: document.getElementById('clientName').value,
                clientDetails: document.getElementById('clientDetails').value,
                invoiceNumber: document.getElementById('invoiceNumber').value,
                currency: document.getElementById('currency').value,
                issueDate: document.getElementById('issueDate').value,
                dueDate: document.getElementById('dueDate').value,
                taxRate: document.getElementById('taxRate').value,
                taxLabel: document.getElementById('taxLabel').value,
                notes: document.getElementById('notes').value,
                lineItems: lineItems,
                logoData: logoData
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `invoice-${document.getElementById('invoiceNumber').value}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadInvoice() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        document.getElementById('businessName').value = data.businessName || '';
                        document.getElementById('businessDetails').value = data.businessDetails || '';
                        document.getElementById('clientName').value = data.clientName || '';
                        document.getElementById('clientDetails').value = data.clientDetails || '';
                        document.getElementById('invoiceNumber').value = data.invoiceNumber || 'INV-001';
                        document.getElementById('currency').value = data.currency || '$';
                        document.getElementById('issueDate').value = data.issueDate || '';
                        document.getElementById('dueDate').value = data.dueDate || '';
                        document.getElementById('taxRate').value = data.taxRate || 0;
                        document.getElementById('taxLabel').value = data.taxLabel || 'Tax';
                        document.getElementById('notes').value = data.notes || '';
                        lineItems = data.lineItems || [];
                        logoData = data.logoData || null;

                        if (logoData) {
                            document.getElementById('logoPreview').innerHTML = `<img src="${logoData}" alt="Logo">`;
                        }

                        renderLineItems();
                        updatePreview();
                        alert('Invoice loaded successfully!');
                    } catch (err) {
                        alert('Error loading invoice file');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
    </script>
</body>

</html>
