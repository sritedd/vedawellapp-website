<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .input-row {
            display: flex;
            gap: .75rem;
            margin-bottom: 1.5rem
        }

        .input-row input {
            flex: 1;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem
        }

        .input-row input:focus {
            outline: none;
            border-color: #667eea
        }

        .input-row button {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600
        }

        .filters {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem
        }

        .filter {
            flex: 1;
            padding: .5rem;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer
        }

        .filter.active {
            background: #667eea;
            color: #fff
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: .85rem;
            color: #888;
            margin-bottom: 1rem
        }

        .todo-list {
            max-height: 400px;
            overflow-y: auto
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: .75rem
        }

        .todo-item.done {
            opacity: .6
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #888
        }

        .todo-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #667eea
        }

        .todo-text {
            flex: 1;
            font-size: 1rem
        }

        .delete-btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 2rem
        }

        .clear-btn {
            width: 100%;
            padding: .75rem;
            margin-top: 1rem;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>✅ Todo List</h1>
        <div class="input-row">
            <input type="text" id="input" placeholder="Add a new task..." onkeypress="if(event.key==='Enter')addTodo()">
            <button onclick="addTodo()">Add</button>
        </div>
        <div class="filters">
            <button class="filter active" onclick="setFilter('all')">All</button>
            <button class="filter" onclick="setFilter('active')">Active</button>
            <button class="filter" onclick="setFilter('done')">Done</button>
        </div>
        <div class="stats">
            <span><span id="activeCount">0</span> tasks remaining</span>
            <span><span id="doneCount">0</span> completed</span>
        </div>
        <div class="todo-list" id="todoList"></div>
        <button class="clear-btn" onclick="clearDone()">Clear Completed</button>
    </div>
    <script>
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let filter = 'all';
        function save() { localStorage.setItem('todos', JSON.stringify(todos)) }
        function render() {
            const list = document.getElementById('todoList');
            const filtered = todos.filter(t => filter === 'all' || filter === 'active' && !t.done || filter === 'done' && t.done);
            if (filtered.length === 0) { list.innerHTML = '<div class="empty">No tasks to show</div>'; return }
            list.innerHTML = filtered.map((t, i) => `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${todos.indexOf(t)})">
                    <span class="todo-text">${t.text}</span>
                    <button class="delete-btn" onclick="remove(${todos.indexOf(t)})">×</button>
                </div>
            `).join('');
            document.getElementById('activeCount').textContent = todos.filter(t => !t.done).length;
            document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
        }
        function addTodo() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (text) { todos.unshift({ text, done: false }); input.value = ''; save(); render() }
        }
        function toggle(i) { todos[i].done = !todos[i].done; save(); render() }
        function remove(i) { todos.splice(i, 1); save(); render() }
        function clearDone() { todos = todos.filter(t => !t.done); save(); render() }
        function setFilter(f) { filter = f; document.querySelectorAll('.filter').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase() === f)); render() }
        render();
    </script>
</body>

</html>
