<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px
        }

        h1 {
            color: #fff;
            margin-bottom: 1rem
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem
        }

        .stat {
            background: rgba(255, 255, 255, .2);
            color: #fff;
            padding: .75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600
        }

        .stat span {
            color: #ffd700
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 400px
        }

        @media(max-width:420px) {
            .grid {
                gap: 8px
            }
        }

        .card {
            width: 80px;
            height: 100px;
            perspective: 1000px;
            cursor: pointer
        }

        @media(max-width:420px) {
            .card {
                width: 70px;
                height: 90px
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform .4s
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg)
        }

        .card.matched .card-inner {
            transform: rotateY(180deg)
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem
        }

        .card-front {
            background: linear-gradient(135deg, #3a3a5c, #2a2a4c);
            box-shadow: 0 4px 15px rgba(0, 0, 0, .3)
        }

        .card-front::after {
            content: '?';
            color: rgba(255, 255, 255, .3);
            font-size: 2rem
        }

        .card-back {
            background: #fff;
            transform: rotateY(180deg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, .2)
        }

        .card.matched .card-back {
            background: #2ecc71
        }

        .controls {
            margin-top: 1.5rem
        }

        .btn {
            padding: .75rem 2rem;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100
        }

        .overlay.show {
            display: flex
        }

        .overlay h2 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 1rem
        }

        .overlay p {
            color: #ccc;
            font-size: 1.25rem;
            margin-bottom: 2rem
        }

        .overlay .highlight {
            color: #ffd700
        }

        .difficulty {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem
        }

        .diff-btn {
            padding: .5rem 1rem;
            background: rgba(255, 255, 255, .2);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer
        }

        .diff-btn.active {
            background: #fff;
            color: #667eea
        }
    </style>
</head>

<body>
    <h1>🧠 Memory Match</h1>
    <div class="difficulty">
        <button class="diff-btn active" onclick="setDifficulty(4)">Easy (4x4)</button>
        <button class="diff-btn" onclick="setDifficulty(6)">Hard (6x4)</button>
    </div>
    <div class="stats">
        <div class="stat">Moves: <span id="moves">0</span></div>
        <div class="stat">Time: <span id="time">0:00</span></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="controls">
        <button class="btn" onclick="newGame()">New Game</button>
    </div>
    <div class="overlay" id="overlay">
        <h2>🎉 You Won!</h2>
        <p>Completed in <span class="highlight" id="finalMoves">0</span> moves and <span class="highlight"
                id="finalTime">0:00</span></p>
        <button class="btn" onclick="newGame()">Play Again</button>
    </div>
    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗'];
        let cards = [], flipped = [], matched = 0, moves = 0, timer = null, seconds = 0, cols = 4;

        function setDifficulty(c) {
            cols = c;
            document.querySelectorAll('.diff-btn').forEach((b, i) => b.classList.toggle('active', i === (c === 4 ? 0 : 1)));
            document.getElementById('grid').style.gridTemplateColumns = `repeat(${cols},1fr)`;
            newGame();
        }
        function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]] } return arr }
        function newGame() {
            const pairs = cols * 4 / 2;
            const selected = shuffle([...emojis]).slice(0, pairs);
            cards = shuffle([...selected, ...selected]);
            flipped = []; matched = 0; moves = 0; seconds = 0;
            document.getElementById('moves').textContent = 0;
            document.getElementById('time').textContent = '0:00';
            document.getElementById('overlay').classList.remove('show');
            if (timer) clearInterval(timer);
            timer = setInterval(() => { seconds++; document.getElementById('time').textContent = Math.floor(seconds / 60) + ':' + String(seconds % 60).padStart(2, '0') }, 1000);
            render();
        }
        function render() {
            document.getElementById('grid').innerHTML = cards.map((emoji, i) => `
                <div class="card" data-index="${i}" onclick="flip(${i})">
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back">${emoji}</div>
                    </div>
                </div>
            `).join('');
        }
        function flip(i) {
            const card = document.querySelector(`.card[data-index="${i}"]`);
            if (card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;
            card.classList.add('flipped');
            flipped.push(i);
            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                const [a, b] = flipped;
                if (cards[a] === cards[b]) {
                    document.querySelector(`.card[data-index="${a}"]`).classList.add('matched');
                    document.querySelector(`.card[data-index="${b}"]`).classList.add('matched');
                    matched += 2;
                    flipped = [];
                    if (matched === cards.length) win();
                } else {
                    setTimeout(() => {
                        document.querySelector(`.card[data-index="${a}"]`).classList.remove('flipped');
                        document.querySelector(`.card[data-index="${b}"]`).classList.remove('flipped');
                        flipped = [];
                    }, 800);
                }
            }
        }
        function win() {
            clearInterval(timer);
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = Math.floor(seconds / 60) + ':' + String(seconds % 60).padStart(2, '0');
            setTimeout(() => document.getElementById('overlay').classList.add('show'), 500);
        }
        newGame();
    </script>
</body>

</html>
