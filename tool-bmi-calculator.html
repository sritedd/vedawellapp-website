<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 4px
        }

        .tab {
            flex: 1;
            padding: .75rem;
            text-align: center;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500
        }

        .tab.active {
            background: #fff;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1)
        }

        .form-group {
            margin-bottom: 1.25rem
        }

        label {
            display: block;
            color: #666;
            font-size: .9rem;
            margin-bottom: .5rem
        }

        input {
            width: 100%;
            padding: .75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem
        }

        input:focus {
            outline: none;
            border-color: #f5576c
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem
        }

        .result {
            text-align: center;
            padding: 2rem;
            background: #f8f9fa;
            border-radius: 15px;
            margin-top: 1rem
        }

        .bmi-value {
            font-size: 3rem;
            font-weight: 700
        }

        .bmi-label {
            font-size: 1.25rem;
            margin-top: .5rem
        }

        .scale {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1.5rem
        }

        .scale div {
            flex: 1
        }

        .s1 {
            background: #3498db
        }

        .s2 {
            background: #2ecc71
        }

        .s3 {
            background: #f1c40f
        }

        .s4 {
            background: #e74c3c
        }

        .scale-labels {
            display: flex;
            font-size: .7rem;
            color: #666;
            margin-top: .25rem
        }

        .scale-labels span {
            flex: 1;
            text-align: center
        }

        .marker {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid #333;
            margin: -4px auto 0;
            transition: margin-left .3s
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>⚖️ BMI Calculator</h1>
        <div class="tabs">
            <button class="tab active" onclick="setUnit('metric')">Metric</button>
            <button class="tab" onclick="setUnit('imperial')">Imperial</button>
        </div>
        <div id="metricInputs">
            <div class="form-group"><label>Height (cm)</label><input type="number" id="heightCm" value="170"
                    oninput="calculate()"></div>
            <div class="form-group"><label>Weight (kg)</label><input type="number" id="weightKg" value="70"
                    oninput="calculate()"></div>
        </div>
        <div id="imperialInputs" style="display:none">
            <div class="row">
                <div class="form-group"><label>Height (ft)</label><input type="number" id="heightFt" value="5"
                        oninput="calculate()"></div>
                <div class="form-group"><label>Height (in)</label><input type="number" id="heightIn" value="7"
                        oninput="calculate()"></div>
            </div>
            <div class="form-group"><label>Weight (lbs)</label><input type="number" id="weightLbs" value="154"
                    oninput="calculate()"></div>
        </div>
        <div class="result">
            <div class="bmi-value" id="bmiValue">24.2</div>
            <div class="bmi-label" id="bmiLabel">Normal weight</div>
            <div style="position:relative;margin-top:1.5rem">
                <div class="marker" id="marker"></div>
                <div class="scale">
                    <div class="s1"></div>
                    <div class="s2"></div>
                    <div class="s3"></div>
                    <div class="s4"></div>
                </div>
                <div class="scale-labels"><span>&lt;18.5</span><span>18.5-25</span><span>25-30</span><span>&gt;30</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        let unit = 'metric';
        function setUnit(u) { unit = u; document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (u === 'metric' ? 0 : 1))); document.getElementById('metricInputs').style.display = u === 'metric' ? 'block' : 'none'; document.getElementById('imperialInputs').style.display = u === 'imperial' ? 'block' : 'none'; calculate() }
        function calculate() {
            let bmi;
            if (unit === 'metric') { const h = parseFloat(document.getElementById('heightCm').value) / 100 || 1; const w = parseFloat(document.getElementById('weightKg').value) || 0; bmi = w / (h * h) }
            else { const ft = parseFloat(document.getElementById('heightFt').value) || 0; const inch = parseFloat(document.getElementById('heightIn').value) || 0; const h = (ft * 12 + inch); const w = parseFloat(document.getElementById('weightLbs').value) || 0; bmi = (w / (h * h)) * 703 }
            let label, color;
            if (bmi < 18.5) { label = 'Underweight'; color = '#3498db' }
            else if (bmi < 25) { label = 'Normal weight'; color = '#2ecc71' }
            else if (bmi < 30) { label = 'Overweight'; color = '#f1c40f' }
            else { label = 'Obese'; color = '#e74c3c' }
            document.getElementById('bmiValue').textContent = bmi.toFixed(1); document.getElementById('bmiValue').style.color = color;
            document.getElementById('bmiLabel').textContent = label; document.getElementById('bmiLabel').style.color = color;
            const pos = Math.min(Math.max((bmi - 15) / (35 - 15) * 100, 0), 100); document.getElementById('marker').style.marginLeft = `calc(${pos}% - 8px)`;
        }
        calculate();
    </script>
</body>

</html>
