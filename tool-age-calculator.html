<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem
        }

        .form-group {
            margin-bottom: 1.25rem
        }

        label {
            display: block;
            color: #666;
            font-size: .9rem;
            margin-bottom: .5rem
        }

        input {
            width: 100%;
            padding: .75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem
        }

        input:focus {
            outline: none;
            border-color: #4facfe
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer
        }

        .results {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem
        }

        .stat {
            background: #f8f9fa;
            padding: 1.5rem 1rem;
            border-radius: 15px;
            text-align: center
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4facfe
        }

        .stat-label {
            font-size: .8rem;
            color: #666;
            margin-top: .25rem
        }

        .extras {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f9ff;
            border-radius: 10px
        }

        .extras p {
            padding: .5rem 0;
            font-size: .9rem;
            display: flex;
            justify-content: space-between
        }

        .extras span {
            font-weight: 600;
            color: #4facfe
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎂 Age Calculator</h1>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" onchange="calculate()">
        </div>
        <div class="results">
            <div class="stat">
                <div class="stat-value" id="years">0</div>
                <div class="stat-label">Years</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="months">0</div>
                <div class="stat-label">Months</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="days">0</div>
                <div class="stat-label">Days</div>
            </div>
        </div>
        <div class="extras">
            <p>Total Months <span id="totalMonths">0</span></p>
            <p>Total Weeks <span id="totalWeeks">0</span></p>
            <p>Total Days <span id="totalDays">0</span></p>
            <p>Total Hours <span id="totalHours">0</span></p>
            <p>Next Birthday <span id="nextBday">-</span></p>
        </div>
    </div>
    <script>
        document.getElementById('dob').valueAsDate = new Date(new Date().setFullYear(new Date().getFullYear() - 25));
        function calculate() {
            const dob = new Date(document.getElementById('dob').value);
            const now = new Date();
            if (isNaN(dob)) return;
            let years = now.getFullYear() - dob.getFullYear();
            let months = now.getMonth() - dob.getMonth();
            let days = now.getDate() - dob.getDate();
            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate() }
            if (months < 0) { years--; months += 12 }
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
            const diff = now - dob; const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('totalMonths').textContent = (years * 12 + months).toLocaleString();
            document.getElementById('totalWeeks').textContent = Math.floor(totalDays / 7).toLocaleString();
            document.getElementById('totalDays').textContent = totalDays.toLocaleString();
            document.getElementById('totalHours').textContent = (totalDays * 24).toLocaleString();
            let nextBday = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
            if (nextBday < now) nextBday.setFullYear(nextBday.getFullYear() + 1);
            const daysUntil = Math.ceil((nextBday - now) / (1000 * 60 * 60 * 24));
            document.getElementById('nextBday').textContent = daysUntil === 0 ? 'Today! 🎉' : daysUntil + ' days';
        }
        calculate();
    </script>
</body>

</html>
